name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Enable Corepack and install pinned Yarn
        run: corepack enable && corepack install

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Syntax check
        run: |
          find src moderation-worker -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run tests
        run: corepack yarn test
        env:
          # Tests use a throwaway data dir and disable external dataset fetches;
          # these keep CI hermetic and fast.
          TOR_LIST_ENABLED: 'false'
          VPN_LISTS_ENABLED: 'false'
