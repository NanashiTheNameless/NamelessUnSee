name: Image Publish Latest (GHCR)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: image-publish-latest-ghcr
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  publish:
    name: Build and Push Latest
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # This privileged publisher only ever builds the trusted main branch.
          # Do not evaluate an event-provided SHA as a checkout ref.
          ref: refs/heads/main
          persist-credentials: false

      - name: Get build metadata
        id: build-meta
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          flavor: latest=true
          tags: type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.build-meta.outputs.sha }}
            org.opencontainers.image.created=${{ steps.build-meta.outputs.time }}
            org.opencontainers.image.description=NamelessUnSee container image

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=min
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old untagged GHCR versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: container
          min-versions-to-keep: 4
          delete-only-untagged-versions: true

  publish-moderation:
    name: Build and Push Moderation Sidecar
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: refs/heads/main
          persist-credentials: false

      - name: Get build metadata
        id: moderation-build-meta
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract moderation Docker metadata
        id: moderation-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}-moderation
          flavor: latest=true
          tags: type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.moderation-build-meta.outputs.sha }}
            org.opencontainers.image.created=${{ steps.moderation-build-meta.outputs.time }}
            org.opencontainers.image.description=NamelessUnSee moderation sidecar

      - name: Build and push moderation image
        uses: docker/build-push-action@v7
        with:
          context: ./moderation-worker
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: mode=min
          tags: ${{ steps.moderation-meta.outputs.tags }}
          labels: ${{ steps.moderation-meta.outputs.labels }}
          cache-from: type=gha,scope=moderation
          cache-to: type=gha,mode=max,scope=moderation
