# Published NamelessUnSee image + Cloudflare Tunnel.
#
# 1. Create a tunnel in the Cloudflare Zero Trust dashboard (Networks > Tunnels),
#    choose the "Cloudflared" connector, and copy the tunnel token.
# 2. Add a Public Hostname to that tunnel pointing your domain (e.g.
#    unsee.example.invalid) to the service URL:  http://app:3000
# 3. Copy .env.example to .env and fill in COOKIE_SECRET, BASE_URL
#    (https://unsee.example.invalid), SECURE_COOKIES=true and TUNNEL_TOKEN.
# 4. docker compose pull && docker compose up -d
#
# Set GHCR_IMAGE to override the default published image, for example when
# testing a pinned tag or digest. Use docker-compose.dev.yml to build locally.
#
# The app itself is never exposed to the host/public directly- all inbound
# traffic arrives through the Cloudflare Tunnel, which also supplies the
# CF-Connecting-IP and CF-IPCountry headers unsee relies on.

services:
  app:
    image: ${GHCR_IMAGE:-ghcr.io/nanashithenameless/namelessunsee:latest}
    pull_policy: always
    env_file: .env
    environment:
      DATA_DIR: /app/data
      PORT: "3000"
      NSFW_SERVICE_URL: http://moderation:8787
    depends_on:
      moderation:
        condition: service_healthy
    volumes:
      # Persists SQLite, reports, and downloaded IP-intelligence databases.
      # Encrypted media is added here only when STORAGE_BACKEND=local; R2 media
      # is uploaded directly after ephemeral staging in the container temp dir.
      - unsee-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  moderation:
    image: ${MODERATION_IMAGE:-ghcr.io/nanashithenameless/namelessunsee-moderation:latest}
    environment:
      PORT: "8787"
      NSFW_MODEL: ${NSFW_MODEL:-onnx-community/nsfw-classifier-ONNX}
      NSFW_SAFETY_MODEL: ${NSFW_SAFETY_MODEL:-OwenElliott/image-safety-classifier-m}
      NSFW_BINARY_MODEL: ${NSFW_BINARY_MODEL:-onnx-community/nsfw_image_detection-ONNX}
      MODEL_CACHE_DIR: /app/models
    volumes:
      - moderation-models:/app/models
    expose:
      - "8787"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  unsee-data:
  moderation-models:
